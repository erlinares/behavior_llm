<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>$title$</title>
<style>
  @page { size: letter; margin: 1in; }

  body {
    font-family: "Times New Roman", "Latin Modern Roman", Georgia, serif;
    font-size: 11pt;
    line-height: 1.5;
    color: #111;
    max-width: 7in;
    margin: 0 auto;
    padding: 0.4in 0;
  }

  article > h1:first-of-type {
    font-size: 17pt;
    font-weight: bold;
    text-align: center;
    line-height: 1.3;
    margin: 0 0 0.6em 0;
  }

  /* byline paragraphs immediately following the title */
  article > h1:first-of-type + p,
  article > h1:first-of-type + p + p,
  article > h1:first-of-type + p + p + p {
    text-align: center;
    margin: 0.15em 0;
  }

  article > h1:first-of-type + p em,
  article > h1:first-of-type + p + p em {
    font-style: italic;
    color: #333;
  }

  article > h1:first-of-type + p strong {
    font-size: 12.5pt;
  }

  hr {
    border: none;
    border-top: 0.75pt solid #999;
    margin: 1em 0;
  }

  blockquote {
    font-size: 10pt;
    margin: 1em 0.35in;
    padding: 0;
  }

  blockquote p {
    text-align: justify;
  }

  blockquote strong:first-child {
    font-variant: small-caps;
  }

  h2 {
    font-size: 13pt;
    margin-top: 1.6em;
    margin-bottom: 0.5em;
    border-bottom: 0.5pt solid #ccc;
    padding-bottom: 0.15em;
  }

  h3 {
    font-size: 11.5pt;
    font-style: italic;
    margin-top: 1.2em;
    margin-bottom: 0.4em;
  }

  h4 {
    font-size: 11pt;
    margin-top: 1em;
    margin-bottom: 0.3em;
  }

  p {
    text-align: justify;
    margin: 0.6em 0;
    orphans: 3;
    widows: 3;
  }

  ul, ol {
    margin: 0.5em 0;
    padding-left: 1.4em;
  }

  li {
    margin: 0.25em 0;
    text-align: justify;
  }

  code {
    font-family: "Courier New", monospace;
    font-size: 9.5pt;
    background: #f3f3f3;
    padding: 0.05em 0.25em;
    border-radius: 2px;
  }

  pre code {
    display: block;
    padding: 0.6em;
    overflow-x: auto;
  }

  a {
    color: #0645ad;
    text-decoration: none;
  }

  table {
    border-collapse: collapse;
    width: 100%;
    margin: 1em 0;
    font-size: 9.5pt;
  }

  th, td {
    border: 0.5pt solid #999;
    padding: 0.3em 0.5em;
    text-align: left;
    vertical-align: top;
  }

  th {
    background: #f0f0f0;
    font-weight: bold;
  }

  em { font-style: italic; }
  strong { font-weight: bold; }

  section#footnotes, .footnotes {
    font-size: 9pt;
    border-top: 0.5pt solid #999;
    margin-top: 2em;
    padding-top: 0.5em;
  }
</style>
</head>
<body>
<article>
$body$
</article>
</body>
</html>
